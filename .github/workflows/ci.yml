name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint-commit:
    name: Check no node_modules or dist committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check node_modules not tracked
        run: |
          if git ls-files | grep -q "^node_modules/"; then
            echo "❌ node_modules/ files are tracked in git. Run:"
            echo "   git rm -r --cached node_modules/"
            exit 1
          fi
          echo "✅ node_modules not tracked"

      - name: Check dist not tracked
        run: |
          if git ls-files | grep -q "^dist/"; then
            echo "❌ dist/ files are tracked in git. Run:"
            echo "   git rm -r --cached dist/"
            exit 1
          fi
          echo "✅ dist not tracked"

  build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build
